<!DOCTYPE html>
<html class="ui-page-login">

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<title></title>
		<link href="css/mui.min.css" rel="stylesheet" />
		<link href="css/style.css" rel="stylesheet" />
		<style>
			.area {
				margin: 20px auto 0px auto;
			}
			
			.mui-input-group {
				margin-top: 10px;
			}
			
			.mui-input-group:first-child {
				margin-top: 20px;
			}
			
			.mui-input-group label {
				width: 22%;
			}
			
			.mui-input-row label~input,
			.mui-input-row label~select,
			.mui-input-row label~textarea {
				width: 78%;
			}
			
			.mui-checkbox input[type=checkbox],
			.mui-radio input[type=radio] {
				top: 6px;
			}
			
			.mui-content-padded {
				margin-top: 25px;
			}
			
			.mui-btn {
				padding: 10px;
			}
			
			.link-area {
				display: block;
				margin-top: 25px;
				text-align: center;
			}
			
			.spliter {
				color: #bbb;
				padding: 0px 8px;
			}
			
			.oauth-area {
				position: absolute;
				bottom: 20px;
				left: 0px;
				text-align: center;
				width: 100%;
				padding: 0px;
				margin: 0px;
			}
			
			.oauth-area .oauth-btn {
				display: inline-block;
				width: 50px;
				height: 50px;
				background-size: 30px 30px;
				background-position: center center;
				background-repeat: no-repeat;
				margin: 0px 20px;
				/*-webkit-filter: grayscale(100%); */
				border: solid 1px #ddd;
				border-radius: 25px;
			}
			
			.oauth-area .oauth-btn:active {
				border: solid 1px #aaa;
			}
			
			.oauth-area .oauth-btn.disabled {
				background-color: #ddd;
			}
		</style>

	</head>

	<body>
		<header class="mui-bar mui-bar-nav">
			<h1 class="mui-title">登录</h1>
		</header>
		<div class="mui-content">
			<form id='login-form' class="mui-input-group">
				<div class="mui-input-row">
					<label>账号</label>
					<input id='account' type="text" class="mui-input-clear mui-input" placeholder="请输入账号">
				</div>
				<div class="mui-input-row">
					<label>密码</label>
					<input id='password' type="password" class="mui-input-clear mui-input" placeholder="请输入密码">
				</div>
			</form>
			<form class="mui-input-group">
				<ul class="mui-table-view mui-table-view-chevron">
					<li class="mui-table-view-cell">
						自动登录
						<div id="autoLogin" class="mui-switch">
							<div class="mui-switch-handle"></div>
						</div>
					</li>
				</ul>
			</form>
			<div class="mui-content-padded">
				<button id='login' class="mui-btn mui-btn-block mui-btn-primary">登录</button>
				<div class="link-area"><a id='reg'>注册账号</a> <span class="spliter">|</span> <a id='forgetPassword'>忘记密码</a>
				</div>
			</div>
			<div class="mui-content-padded oauth-area">

			</div>
		</div>
		<script src="js/mui.min.js"></script>
		<script src="js/mui.enterfocus.js"></script>
		<script src="js/app.js"></script>
		<script>
			(function($, doc) {
				$.init({
					statusBarBackground: '#f7f7f7'
				});
				$.plusReady(function() {
					plus.screen.lockOrientation("portrait-primary");
					var settings = app.getSettings();
					var state = app.getState();
					var mainPage = plus.webview.getWebviewById("main");
					var main_loaded_flag = false;
					if(!mainPage){
						mainPage = $.preload({
							"id": 'main',
							"url": 'main.html'
						});
					}else{
						main_loaded_flag = true;
					}
					
					mainPage.addEventListener("loaded",function () {
						main_loaded_flag = true;
					});
					var toMain = function() {
						//使用定时器的原因：
						//可能执行太快，main页面loaded事件尚未触发就执行自定义事件，此时必然会失败
						var id = setInterval(function () {
							if(main_loaded_flag){
								clearInterval(id);
								$.fire(mainPage, 'show', null);
								mainPage.show("pop-in");
							}
						},20);
					};
					//检查 "登录状态/锁屏状态" 开始
					if (settings.autoLogin && state.token && settings.gestures) {
						$.openWindow({
							url: 'unlock.html',
							id: 'unlock',
							show: {
								aniShow: 'pop-in'
							},
							waiting: {
								autoShow: false
							}
						});
					} else if (settings.autoLogin && state.token) {
						toMain();
					} else {
						// 第三方登录 - 钉钉 OAuth
						var authBtns = ['dingtalk'];
						var oauthArea = doc.querySelector('.oauth-area');
						
						var btn = document.createElement('div');
						btn.setAttribute('class', 'oauth-btn');
						btn.authId = 'dingtalk';
						btn.style.backgroundImage = 'url("images/dingtalk.png")';
						oauthArea.appendChild(btn);
						function isDingTalkInstalled() {
						    return plus.runtime.isApplicationExist({
						        pname: 'com.alibaba.android.rimet',  // Android 包名
						        action: 'dingtalk://'                // iOS URL Scheme
						    });
						}
						$(oauthArea).on('tap', '.oauth-btn', function() {
							  if (!isDingTalkInstalled()) {
							        // 提示用户未安装，并提供下载引导
							        plus.nativeUI.confirm('您尚未安装钉钉客户端，是否前往应用商店下载？', function(e) {
							            if (e.index === 0) { // 点击“确定”
							                // 根据平台跳转应用商店（或钉钉官网）
							                if (plus.os.name === 'Android') {
							                    plus.runtime.openURL('market://details?id=com.alibaba.android.rimet');
							                } else {
							                    plus.runtime.openURL('https://apps.apple.com/cn/app/id930368978');
							                }
							            }
							        }, '提示', ['去下载', '取消']);
							        return;
									}
						    var appId = '7fce9783-27dc-4f9a-b793-fabe80cd5a0c';
						    var redirectUri = encodeURIComponent('http://39.105.155.140:3004/yida/sso/authorize?client_id=yida-client-id&redirect_uri=https://your-company.aliwork.com&response_type=code&state=random-state-string'); // 回调地址
						    var state = '任意字符串'; // 可选，防止CSRF
						    var authUrl = 'https://oapi.dingtalk.com/connect/qrconnect?appid=' + appId +
						                   '&response_type=code&scope=snsapi_login&state=' + state +
						                   '&redirect_uri=' + redirectUri;
						
						    // 打开WebView加载钉钉授权页
						    var webview = plus.webview.create(authUrl, 'dingtalkAuth', {
						        titleNView: { titleText: '钉钉登录', autoBackButton: true }
						    });
						    webview.show();
						
						    // 监听WebView的URL加载完成事件，捕获回调地址
						    var onLoading = function() {
						        var currentUrl = webview.getURL();
						        if (currentUrl.indexOf(redirectUri) === 0) {
						            // 提取code参数
						            var match = currentUrl.match(/[?&]code=([^&]+)/);
						            if (match) {
						                var code = match[1];
						                webview.close(); // 关闭授权页
						
						                var waiting = plus.nativeUI.showWaiting('登录中...');
						
						                // 将code发送到后端换取用户信息
						                exchangeUserInfo(code, function(userInfo) {
						                    waiting.close();
						                    var name = userInfo.nickname || userInfo.name;
						                    app.createState(name, function() {
						                        toMain();
						                    });
						                });
						            }
						        }
						    };
						    webview.addEventListener('loaded', onLoading);
						});
						
						function exchangeUserInfo(code, callback) {
						    // 后端接口需接收code并返回用户信息
						    plus.http.post('https://yourdomain.com/api/dingtalk/login', {code: code}, function(res) {
						        if (res.status === 200) {
						            var userInfo = JSON.parse(res.responseText).data;
						            callback(userInfo);
						        } else {
						            plus.nativeUI.toast('登录失败，请重试');
						        }
						    });
						}
					}
					// close splash
					setTimeout(function() {
						//关闭 splash
						plus.navigator.closeSplashscreen();
					}, 600);
					//检查 "登录状态/锁屏状态" 结束
					var loginButton = doc.getElementById('login');
					var accountBox = doc.getElementById('account');
					var passwordBox = doc.getElementById('password');
					var autoLoginButton = doc.getElementById("autoLogin");
					var regButton = doc.getElementById('reg');
					var forgetButton = doc.getElementById('forgetPassword');
					loginButton.addEventListener('tap', function(event) {
						var loginInfo = {
							account: accountBox.value,
							password: passwordBox.value
						};
						app.login(loginInfo, function(err) {
							if (err) {
								plus.nativeUI.toast(err);
								return;
							}
							toMain();
						});
					});
					$.enterfocus('#login-form input', function() {
						$.trigger(loginButton, 'tap');
					});
					autoLoginButton.classList[settings.autoLogin ? 'add' : 'remove']('mui-active')
					autoLoginButton.addEventListener('toggle', function(event) {
						setTimeout(function() {
							var isActive = event.detail.isActive;
							settings.autoLogin = isActive;
							app.setSettings(settings);
						}, 50);
					}, false);
					regButton.addEventListener('tap', function(event) {
						$.openWindow({
							url: 'reg.html',
							id: 'reg',
							preload: true,
							show: {
								aniShow: 'pop-in'
							},
							styles: {
								popGesture: 'hide'
							},
							waiting: {
								autoShow: false
							}
						});
					}, false);
					forgetButton.addEventListener('tap', function(event) {
						$.openWindow({
							url: 'forget_password.html',
							id: 'forget_password',
							preload: true,
							show: {
								aniShow: 'pop-in'
							},
							styles: {
								popGesture: 'hide'
							},
							waiting: {
								autoShow: false
							}
						});
					}, false);
					//
					window.addEventListener('resize', function() {
						oauthArea.style.display = document.body.clientHeight > 400 ? 'block' : 'none';
					}, false);
					//
					var backButtonPress = 0;
					$.back = function(event) {
						backButtonPress++;
						if (backButtonPress > 1) {
							plus.runtime.quit();
						} else {
							plus.nativeUI.toast('再按一次退出应用');
						}
						setTimeout(function() {
							backButtonPress = 0;
						}, 1000);
						return false;
					};
				});
			}(mui, document));
		</script>
	</body>

</html>
